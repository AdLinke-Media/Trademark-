yml (GitHub Actions)
• Minimal CI workflow (example):name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with: node-version: 18
      - run: npm ci
      - run: npm test
      - run: npm audit --audit-level=moderate
